    <!-- ══ Google Analytics 4 — deferred until after load (protects LCP) ══ -->
    <script>
      const storedCookieChoice = (() => {
        try {
          return localStorage.getItem('zmg_cookies');
        } catch {
          return null;
        }
      })();
      window.__zmgAnalyticsConsentGranted = storedCookieChoice === 'accepted';
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: window.__zmgAnalyticsConsentGranted ? 'granted' : 'denied',
      });
      window.loadGoogleAnalytics = function loadGoogleAnalytics() {
        if (window.__zmgGaLoaded || !window.__zmgAnalyticsConsentGranted) return;
        window.__zmgGaLoaded = true;
        const s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-09PEREH8MR';
        s.onload = function () {
          gtag('js', new Date());
          gtag('config', 'G-09PEREH8MR', {
            anonymize_ip: true,
            send_page_view: false,
          });
        };
        document.head.appendChild(s);
      };
      if (window.__zmgAnalyticsConsentGranted) {
        if (document.readyState === 'complete') {
          window.loadGoogleAnalytics();
        } else {
          window.addEventListener('load', window.loadGoogleAnalytics, { once: true });
        }
      }
    </script>
